name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate Tag and Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate release tag matches project version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
              raise SystemExit(f"Invalid tag format: {tag}")
          tag_version = tag[1:]

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          pkg_version = pyproject["project"]["version"]

          init_text = Path("src/larops/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'__version__ = "([^"]+)"', init_text)
          if not match:
              raise SystemExit("Cannot find __version__ in src/larops/__init__.py")
          init_version = match.group(1)

          if tag_version != pkg_version or tag_version != init_version:
              raise SystemExit(
                  "Version mismatch detected:\n"
                  f"- tag: {tag_version}\n"
                  f"- pyproject: {pkg_version}\n"
                  f"- __init__: {init_version}"
              )

          print(f"Version check passed: {tag_version}")
          PY

      - name: Ruff
        run: python -m ruff check

      - name: Pytest
        run: python -m pytest -q

  build_dist:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: larops-dist
          path: dist/*

  github_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build_dist
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: larops-dist
          path: dist

      - name: Generate release notes from CHANGELOG
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          tag = os.environ["GITHUB_REF_NAME"]
          changelog = Path("CHANGELOG.md")
          out = Path("release-notes.md")
          if not changelog.exists():
              out.write_text("Automated release.", encoding="utf-8")
              raise SystemExit(0)

          text = changelog.read_text(encoding="utf-8")
          start_pattern = rf"^## {re.escape(tag)}\b.*$"
          header = re.search(start_pattern, text, flags=re.MULTILINE)
          if not header:
              out.write_text("Automated release.", encoding="utf-8")
              raise SystemExit(0)

          start = header.start()
          rest = text[start:]
          next_header = re.search(r"^##\s+v?\d+\.\d+\.\d+.*$", rest[1:], flags=re.MULTILINE)
          end = start + 1 + next_header.start() if next_header else len(text)
          out.write_text(text[start:end].strip() + "\n", encoding="utf-8")
          PY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            scripts/install.sh
          body_path: release-notes.md
          generate_release_notes: true
