name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_and_test:
    name: Lint and Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check

      - name: Pytest
        run: python -m pytest -q

  db_integration:
    name: DB Integration (MySQL + PostgreSQL)
    runs-on: ubuntu-latest
    needs: lint_and_test
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -prootpass --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install DB clients
        run: |
          sudo apt-get update -y
          sudo apt-get install -y default-mysql-client postgresql-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Wait for MySQL and PostgreSQL
        env:
          PGPASSWORD: postgrespass
        run: |
          for _ in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -prootpass --silent && break
            sleep 2
          done
          for _ in $(seq 1 30); do
            psql -h 127.0.0.1 -p 5432 -U postgres -d postgres -c "SELECT 1" >/dev/null 2>&1 && break
            sleep 2
          done

      - name: Run DB integration tests
        env:
          LAROPS_RUN_DB_INTEGRATION: "1"
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: "3306"
          MYSQL_USER: root
          MYSQL_PASSWORD: rootpass
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5432"
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespass
        run: python -m pytest -q tests/integration/test_db_engine_integration.py

  docker_smoke:
    name: Docker Build and Smoke
    runs-on: ubuntu-latest
    needs:
      - lint_and_test
      - db_integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t larops-ci:${{ github.sha }} .

      - name: Test in container
        run: docker run --rm larops-ci:${{ github.sha }} pytest -q

      - name: CLI smoke
        run: docker run --rm larops-ci:${{ github.sha }} larops --help
